version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jobboard-postgres
    environment:
      POSTGRES_DB: jobboard_db
      POSTGRES_USER: jobboard_user
      POSTGRES_PASSWORD: jobboard_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: